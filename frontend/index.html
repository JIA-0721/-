<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时多模态 AI 语音助手</title>
    <meta name="description" content="基于 Gemini Live API 的实时多模态语音视觉交互助手">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 10px 0;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #7f5af0, #2cb67d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 12px;
            color: #72757e;
            font-weight: 300;
        }

        /* Status Badge */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .badge .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ef4444;
        }
        .badge .dot.connected { background: #2cb67d; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Glass Card */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            overflow: hidden;
        }

        /* Video Section */
        .video-wrap {
            position: relative;
            aspect-ratio: 16/10;
            background: #000;
        }
        .video-wrap video {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .video-overlay {
            position: absolute;
            bottom: 10px; left: 10px;
            padding: 4px 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            font-size: 10px;
            color: #aaa;
        }

        /* Waveform / AI Speaking Indicator */
        .ai-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            min-height: 60px;
        }
        .wave-bars {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 30px;
        }
        .wave-bars .bar {
            width: 3px;
            background: #7f5af0;
            border-radius: 2px;
            height: 8px;
            transition: height 0.1s;
        }
        .wave-bars.active .bar { animation: wave 0.6s ease-in-out infinite; }
        .wave-bars.active .bar:nth-child(1) { animation-delay: 0s; }
        .wave-bars.active .bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bars.active .bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bars.active .bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bars.active .bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bars.active .bar:nth-child(6) { animation-delay: 0.3s; }
        .wave-bars.active .bar:nth-child(7) { animation-delay: 0.2s; }
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 28px; }
        }
        .ai-status-text {
            font-size: 13px;
            color: #72757e;
            font-weight: 400;
        }
        .ai-status-text.speaking { color: #7f5af0; }
        .ai-status-text.listening { color: #2cb67d; }

        /* Transcription Area */
        .transcript-section { padding: 16px 20px; }
        .transcript-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .transcript-box {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            min-height: 44px;
            display: flex;
            align-items: center;
            word-break: break-word;
        }
        .transcript-box.user {
            background: rgba(44, 182, 125, 0.08);
            border: 1px solid rgba(44, 182, 125, 0.15);
            color: #8fd8b8;
        }
        .transcript-box.ai {
            background: rgba(127, 90, 240, 0.08);
            border: 1px solid rgba(127, 90, 240, 0.15);
            color: #bfa8f7;
            margin-top: 10px;
        }
        .transcript-box .placeholder {
            color: #444;
            font-style: italic;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 0 20px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-start {
            background: linear-gradient(135deg, #7f5af0, #6246c7);
            color: white;
            box-shadow: 0 4px 20px rgba(127,90,240,0.3);
        }
        .btn-start:hover:not(:disabled) {
            box-shadow: 0 6px 30px rgba(127,90,240,0.5);
            transform: translateY(-1px);
        }
        .btn-stop {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }
        .btn-stop:hover:not(:disabled) {
            background: rgba(239,68,68,0.25);
        }

        /* Log */
        .log-toggle {
            text-align: center;
            padding: 6px;
        }
        .log-toggle button {
            background: none; border: none; color: #555;
            font-size: 11px; cursor: pointer; font-family: 'Inter';
        }
        .log-area {
            display: none;
            max-height: 140px;
            overflow-y: auto;
            padding: 10px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #5a5e6a;
            line-height: 1.7;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .log-area.show { display: block; }
        .log-area::-webkit-scrollbar { width: 4px; }
        .log-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>🤖 AI 多模态语音助手</h1>
        <div class="subtitle">Powered by Gemini Live API · 实时语音 + 视觉</div>
    </div>

    <div class="status-bar">
        <div class="badge"><div class="dot" id="statusDot"></div><span id="statusText">未连接</span></div>
        <div class="badge">🧠 gemini-3.1-flash-live</div>
    </div>

    <div class="card">
        <div class="video-wrap">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="video-overlay" id="videoInfo">📹 摄像头未开启</div>
        </div>

        <div class="ai-indicator">
            <div class="wave-bars" id="waveBars">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <span class="ai-status-text" id="aiStatusText">等待连接...</span>
        </div>

        <div class="transcript-section">
            <div class="transcript-label">🎤 你说的</div>
            <div class="transcript-box user" id="userTranscript">
                <span class="placeholder">等待语音输入...</span>
            </div>

            <div class="transcript-label" style="margin-top:14px">🤖 AI 回复</div>
            <div class="transcript-box ai" id="aiTranscript">
                <span class="placeholder">等待 AI 回应...</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">▶ 开始对话</button>
            <button class="btn btn-stop" id="stopBtn" disabled>■ 结束</button>
        </div>

        <div class="log-toggle">
            <button onclick="document.getElementById('logArea').classList.toggle('show')">▾ 调试日志</button>
        </div>
        <div class="log-area" id="logArea"></div>
    </div>
</div>

<script>
// ============================
// 全局状态
// ============================
let ws = null;
let mediaStream = null;
let audioContext = null;
let workletNode = null;
let videoTimer = null;

// 音频播放相关
let playbackCtx = null;
let audioQueue = [];
let isPlaying = false;
let nextPlayTime = 0;

// DOM
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const aiStatusText = document.getElementById('aiStatusText');
const waveBars = document.getElementById('waveBars');
const userTranscript = document.getElementById('userTranscript');
const aiTranscript = document.getElementById('aiTranscript');
const localVideo = document.getElementById('localVideo');
const videoInfo = document.getElementById('videoInfo');
const logArea = document.getElementById('logArea');

function log(msg) {
    const t = new Date().toLocaleTimeString();
    logArea.innerHTML += `<div>[${t}] ${msg}</div>`;
    logArea.scrollTop = logArea.scrollHeight;
}

function setStatus(connected) {
    statusDot.className = 'dot' + (connected ? ' connected' : '');
    statusText.textContent = connected ? '已连接' : '未连接';
}

function setAIStatus(mode) {
    aiStatusText.className = 'ai-status-text';
    waveBars.className = 'wave-bars';
    if (mode === 'speaking') {
        aiStatusText.textContent = '🔊 AI 正在说话...';
        aiStatusText.classList.add('speaking');
        waveBars.classList.add('active');
    } else if (mode === 'listening') {
        aiStatusText.textContent = '🎧 正在聆听...';
        aiStatusText.classList.add('listening');
    } else {
        aiStatusText.textContent = '等待连接...';
    }
}

// ============================
// AudioWorklet Processor (inline)
// ============================
function createWorkletBlob() {
    const code = `
        class PCMProcessor extends AudioWorkletProcessor {
            constructor() {
                super();
                this.bufferSize = 2048;
                this.buffer = new Float32Array(this.bufferSize);
                this.writeIndex = 0;
            }
            process(inputs) {
                const input = inputs[0];
                if (!input || !input[0]) return true;
                const channelData = input[0];
                for (let i = 0; i < channelData.length; i++) {
                    this.buffer[this.writeIndex++] = channelData[i];
                    if (this.writeIndex >= this.bufferSize) {
                        // 转换为 16-bit PCM
                        const pcm16 = new Int16Array(this.bufferSize);
                        for (let j = 0; j < this.bufferSize; j++) {
                            const s = Math.max(-1, Math.min(1, this.buffer[j]));
                            pcm16[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        this.port.postMessage(pcm16.buffer, [pcm16.buffer]);
                        this.buffer = new Float32Array(this.bufferSize);
                        this.writeIndex = 0;
                    }
                }
                return true;
            }
        }
        registerProcessor('pcm-processor', PCMProcessor);
    `;
    return URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
}

// ============================
// 音频采集 (16kHz PCM)
// ============================
async function startAudioCapture() {
    const stream = await navigator.mediaDevices.getUserMedia({
        audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });

    audioContext = new AudioContext({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(stream);

    const workletUrl = createWorkletBlob();
    await audioContext.audioWorklet.addModule(workletUrl);
    URL.revokeObjectURL(workletUrl);

    workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
    workletNode.port.onmessage = (e) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            // ArrayBuffer -> Base64
            const bytes = new Uint8Array(e.data);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            const b64 = btoa(binary);
            ws.send(JSON.stringify({ type: 'audio', data: b64 }));
        }
    };

    source.connect(workletNode);
    workletNode.connect(audioContext.destination); // 需要连接才能运行

    return stream;
}

// ============================
// 音频播放 (24kHz PCM)
// ============================
function initPlayback() {
    playbackCtx = new AudioContext({ sampleRate: 24000 });
    audioQueue = [];
    isPlaying = false;
    nextPlayTime = 0;
}

function enqueueAudio(base64Data) {
    // Base64 -> Int16Array -> Float32
    const raw = atob(base64Data);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    const int16 = new Int16Array(bytes.buffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768.0;
    }

    // 创建 AudioBuffer 并排队播放
    const buffer = playbackCtx.createBuffer(1, float32.length, 24000);
    buffer.getChannelData(0).set(float32);

    const now = playbackCtx.currentTime;
    if (nextPlayTime < now) nextPlayTime = now;

    const source = playbackCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(playbackCtx.destination);
    source.start(nextPlayTime);

    nextPlayTime += buffer.duration;

    if (!isPlaying) {
        isPlaying = true;
        setAIStatus('speaking');
    }

    // 当这段播放完后检查是否结束
    source.onended = () => {
        if (playbackCtx.currentTime >= nextPlayTime - 0.05) {
            isPlaying = false;
            setAIStatus('listening');
        }
    };
}

function clearPlaybackQueue() {
    // 重置播放上下文以实现打断
    if (playbackCtx) {
        playbackCtx.close();
    }
    initPlayback();
    isPlaying = false;
}

// ============================
// 视频帧采集
// ============================
function startVideoCapture() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 320;
    canvas.height = 200;

    videoTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ctx.drawImage(localVideo, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.4);
            const b64 = dataUrl.split(',')[1];
            ws.send(JSON.stringify({ type: 'video', data: b64 }));
        }
    }, 1000); // 1fps 节省 token
}

// ============================
// 主逻辑
// ============================
startBtn.onclick = async () => {
    try {
        startBtn.disabled = true;
        log('正在请求音视频权限...');

        // 尝试获取摄像头（可选，失败则纯语音模式）
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 400, frameRate: 15 }
            });
            localVideo.srcObject = mediaStream;
            videoInfo.textContent = '📹 摄像头已开启';
            log('✅ 摄像头已开启');
        } catch (camErr) {
            log('⚠️ 摄像头不可用，将以纯语音模式运行: ' + camErr.message);
            videoInfo.textContent = '📹 摄像头不可用（纯语音模式）';
            mediaStream = new MediaStream(); // 空流占位
        }

        // 初始化音频播放
        initPlayback();

        // 连接 WebSocket
        log('正在连接后端...');
        ws = new WebSocket('ws://localhost:8080');

        ws.onopen = async () => {
            log('✅ 已连接后端中继服务器');
            setStatus(true);
            // 等待 Gemini ready
        };

        ws.onmessage = async (event) => {
            const msg = JSON.parse(event.data);

            if (msg.type === 'ready') {
                log('🎯 Gemini Live API 就绪，开始音频采集');
                // 启动音频采集
                const audioStream = await startAudioCapture();
                // 合并音频轨道到 mediaStream
                audioStream.getAudioTracks().forEach(t => mediaStream.addTrack(t));
                // 仅在摄像头可用时启动视频帧发送
                if (mediaStream.getVideoTracks().length > 0) {
                    startVideoCapture();
                    log('📹 视频帧采集已启动 (1fps)');
                }
                setAIStatus('listening');
                stopBtn.disabled = false;
                log('🎙️ 开始实时语音交互，请说话...');
            }

            if (msg.type === 'audio') {
                enqueueAudio(msg.data);
            }

            if (msg.type === 'input_transcription') {
                userTranscript.innerHTML = msg.text;
            }

            if (msg.type === 'output_transcription') {
                aiTranscript.innerHTML = msg.text;
            }

            if (msg.type === 'turn_complete') {
                setAIStatus('listening');
                log('✅ AI 回复完成');
            }

            if (msg.type === 'interrupted') {
                clearPlaybackQueue();
                setAIStatus('listening');
                log('⚡ 用户打断了 AI');
            }

            if (msg.type === 'error') {
                log('❌ ' + msg.text);
            }

            if (msg.type === 'gemini_disconnected') {
                log('🔌 Gemini 连接已断开');
                stopAll();
            }
        };

        ws.onclose = () => {
            setStatus(false);
            log('🔌 后端连接断开');
            stopAll();
        };

        ws.onerror = (e) => {
            log('❌ WebSocket 错误');
        };

    } catch (err) {
        log('❌ 启动失败: ' + err.message);
        startBtn.disabled = false;
    }
};

function stopAll() {
    if (videoTimer) { clearInterval(videoTimer); videoTimer = null; }
    if (workletNode) { workletNode.disconnect(); workletNode = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (playbackCtx) { playbackCtx.close(); playbackCtx = null; }
    if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
    }
    localVideo.srcObject = null;
    videoInfo.textContent = '📹 摄像头未开启';
    setAIStatus('idle');
    setStatus(false);
    startBtn.disabled = false;
    stopBtn.disabled = true;
}

stopBtn.onclick = () => {
    if (ws) { ws.close(); ws = null; }
    stopAll();
    log('已手动断开连接');
};
</script>
</body>
</html>
